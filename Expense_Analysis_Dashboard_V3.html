*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#1a1d27;--bg3:#222635;--bd:#2e3248;
  --tx:#e2e8f0;--tx2:#94a3b8;--tx3:#64748b;
  --p:#6366f1;--pa:#818cf8;--ps:#c7d2fe;
  --a:#22d3ee;--w:#f59e0b;--d:#ef4444;--g:#10b981;
  --fix:#6366f1;--var:#f59e0b;
  --cf:#10b981;--cc:#6366f1;--cm:#94a3b8;
  --r:10px;--r2:6px;--sh:0 4px 24px rgba(0,0,0,.4)
}
body{background:var(--bg);color:var(--tx);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column}
/* NAV */
nav{display:flex;flex-wrap:wrap;gap:4px;padding:10px 16px;background:var(--bg2);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:100}
nav .ni{cursor:pointer;padding:6px 12px;border-radius:var(--r2);font-size:.78rem;color:var(--tx2);transition:all .2s;white-space:nowrap}
nav .ni:hover{background:var(--bg3);color:var(--tx)}
nav .ni.act{background:var(--p);color:#fff;font-weight:600}
/* PAGES */
.pg{display:none;padding:20px;flex:1;animation:fi .25s ease}
.pg.act{display:block}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
/* KPI CARDS */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:16px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent,var(--p))}
.kpi .lbl{font-size:.72rem;color:var(--tx3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.kpi .val{font-size:1.5rem;font-weight:700;color:var(--tx)}
.kpi .sub{font-size:.72rem;color:var(--tx3);margin-top:4px}
.kpi .badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:.7rem;font-weight:600;margin-top:6px}
.badge.pos{background:rgba(16,185,129,.15);color:#10b981}
.badge.neg{background:rgba(239,68,68,.15);color:#ef4444}
.badge.neu{background:rgba(148,163,184,.15);color:#94a3b8}
/* GRID */
.grid{display:grid;gap:16px;margin-bottom:16px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:1fr 1fr 1fr}
.g31{grid-template-columns:2fr 1fr}
.g13{grid-template-columns:1fr 2fr}
@media(max-width:768px){.g2,.g3,.g31,.g13{grid-template-columns:1fr}}
/* CARD */
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:16px}
.card h3{font-size:.85rem;font-weight:600;color:var(--tx2);margin-bottom:14px;display:flex;align-items:center;gap:6px}
.card h3 span{font-size:.75rem;background:var(--bg3);padding:2px 8px;border-radius:20px;color:var(--tx3)}
.ch-wrap{position:relative;height:220px}
.ch-wrap.tall{height:300px}
/* TABLE */
.tbl-wrap{overflow-x:auto;max-height:400px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:.8rem}
th{background:var(--bg3);color:var(--tx2);padding:8px 12px;text-align:left;position:sticky;top:0;font-weight:600;border-bottom:1px solid var(--bd)}
td{padding:8px 12px;border-bottom:1px solid var(--bd);color:var(--tx2)}
tr:hover td{background:rgba(255,255,255,.03)}
td.num{text-align:right;font-variant-numeric:tabular-nums}
td.pos{color:#10b981}td.neg{color:#ef4444}
/* PILLS */
.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:.7rem;font-weight:600}
.pill.fix{background:rgba(99,102,241,.2);color:#818cf8}
.pill.var{background:rgba(245,158,11,.2);color:#f59e0b}
.pill.cf{background:rgba(16,185,129,.2);color:#10b981}
.pill.cc{background:rgba(99,102,241,.2);color:#818cf8}
.pill.cm{background:rgba(148,163,184,.2);color:#94a3b8}
/* PROGRESS BAR */
.prog{background:var(--bg3);border-radius:4px;height:8px;overflow:hidden;margin-top:4px}
.prog-bar{height:100%;border-radius:4px;transition:width .6s ease}
/* IMPORT MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:24px;width:min(700px,95vw);max-height:90vh;overflow-y:auto}
.modal h2{font-size:1rem;font-weight:700;margin-bottom:16px;color:var(--tx)}
.modal-close{float:right;background:none;border:none;color:var(--tx3);font-size:1.2rem;cursor:pointer;margin-top:-4px}
.modal-close:hover{color:var(--tx)}
/* toggle */
.toggle-row{display:flex;gap:8px;margin-bottom:16px}
.tgl{flex:1;padding:8px;border-radius:var(--r2);border:1px solid var(--bd);background:var(--bg3);color:var(--tx2);cursor:pointer;font-size:.82rem;text-align:center;transition:all .2s}
.tgl.act{background:var(--p);border-color:var(--p);color:#fff;font-weight:600}
/* drop zone */
.drop-zone{border:2px dashed var(--bd);border-radius:var(--r);padding:32px;text-align:center;color:var(--tx3);cursor:pointer;transition:all .2s;margin-bottom:16px}
.drop-zone:hover,.drop-zone.drag{border-color:var(--p);background:rgba(99,102,241,.05);color:var(--tx2)}
.drop-zone .ico{font-size:2rem;margin-bottom:8px}
/* col map */
.col-map{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;margin-bottom:8px;font-size:.8rem}
.col-map select{background:var(--bg3);border:1px solid var(--bd);color:var(--tx);padding:5px 8px;border-radius:var(--r2);font-size:.78rem}
.col-map select:focus{outline:1px solid var(--p)}
.arrow{color:var(--p)}
/* preview */
.preview-box{background:var(--bg3);border-radius:var(--r2);padding:10px;margin-bottom:12px;overflow-x:auto;font-size:.75rem}
.preview-box table th{background:transparent;color:var(--p);font-size:.72rem}
/* validation */
.vld-msg{padding:8px 12px;border-radius:var(--r2);font-size:.78rem;margin-bottom:10px}
.vld-msg.ok{background:rgba(16,185,129,.15);color:#10b981}
.vld-msg.err{background:rgba(239,68,68,.15);color:#ef4444}
.vld-msg.warn{background:rgba(245,158,11,.15);color:#f59e0b}
/* BUTTONS */
.btn{padding:8px 18px;border-radius:var(--r2);border:none;cursor:pointer;font-size:.82rem;font-weight:600;transition:all .2s}
.btn-p{background:var(--p);color:#fff}
.btn-p:hover{background:var(--pa)}
.btn-g{background:rgba(16,185,129,.15);color:#10b981;border:1px solid rgba(16,185,129,.3)}
.btn-g:hover{background:rgba(16,185,129,.25)}
.btn-ghost{background:transparent;color:var(--tx2);border:1px solid var(--bd)}
.btn-ghost:hover{background:var(--bg3)}
.btn-row{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
/* SECTION TITLE */
.sec-title{font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--bd)}
/* scatter tooltip */
.tooltip-custom{position:absolute;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r2);padding:8px 12px;font-size:.75rem;pointer-events:none;z-index:50}
/* SCROLLBAR */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
/* page header */
.pg-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:8px}
.pg-hdr h2{font-size:1.1rem;font-weight:700;color:var(--tx)}
.pg-hdr .pg-sub{font-size:.78rem;color:var(--tx3)}
/* badge row */
.legend-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;font-size:.75rem}
.leg{display:flex;align-items:center;gap:4px;color:var(--tx2)}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
/* input range */
input[type=range]{accent-color:var(--p);width:100%}
</style>
</head>

<!-- IMPORT MODAL -->
<div class="modal-bg" id="impModal">
<div class="modal">
  <button class="modal-close" onclick="closeModal()">✕</button>
  <h2>📥 資料匯入</h2>
  <div class="toggle-row">
    <div class="tgl act" id="modeReplace" onclick="setMode('replace')">🔄 取代模式<br><small>清除舊資料，載入新資料</small></div>
    <div class="tgl" id="modeAppend" onclick="setMode('append')">➕ 追加模式<br><small>保留舊資料，新增筆數</small></div>
  </div>
  <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()"
    ondragover="event.preventDefault();this.classList.add('drag')"
    ondragleave="this.classList.remove('drag')"
    ondrop="event.preventDefault();this.classList.remove('drag');handleFile(event.dataTransfer.files[0])">
    <div class="ico">📁</div>
    <div>拖曳 CSV / Excel 至此，或點擊選擇檔案</div>
    <div style="font-size:.72rem;margin-top:4px">支援 .csv / .xlsx / .xls</div>
  </div>
  <input type="file" id="fileInput" accept=".csv,.xlsx,.xls" style="display:none" onchange="handleFile(this.files[0])">

  <div id="mapSection" style="display:none">
    <div class="sec-title">欄位對應</div>
    <div id="colMapRows"></div>
    <div id="vldMsg"></div>
    <div class="sec-title" style="margin-top:10px">資料預覽（前5筆）</div>
    <div class="preview-box" id="previewBox"></div>
    <div class="btn-row">
      <button class="btn btn-p" onclick="confirmImport()">✅ 確認匯入</button>
      <button class="btn btn-ghost" onclick="resetImport()">↩ 重新選擇</button>
    </div>
  </div>
</div>
</div>

const charts={};
function mkChart(id,cfg){
  if(charts[id]){charts[id].destroy()}
  const el=document.getElementById(id);
  if(!el)return null;
  charts[id]=new Chart(el,cfg);
  return charts[id];
}
function aggBy(data,key,valKey='Actual_Amount'){
  const m={};
  data.forEach(r=>{const k=r[key];m[k]=(m[k]||0)+(+r[valKey]||0)});
  return m;
}
function months(data){
  const m={};
  data.forEach(r=>{
    const mo=r.Date?r.Date.slice(0,7):'';
    if(mo)m[mo]=(m[mo]||0)+(+r.Actual_Amount||0)
  });
  return m;
}
function uniq(data,key){return [...new Set(data.map(r=>r[key]).filter(Boolean))]}
function pct(a,b){return b?((a-b)/b*100).toFixed(1):'0'}

// ─── BUILD LAYOUT ──────────────────────────────────────────────────────────
function buildLayout(){
  const nav=document.getElementById('nav');
  const pgs=document.getElementById('pages');
  nav.innerHTML='';pgs.innerHTML='';
  pages.forEach((p,i)=>{
    const n=document.createElement('div');
    n.className='ni'+(i===0?' act':'');
    n.setAttribute('data-pg',p.id);
    n.textContent=p.label;
    n.onclick=()=>goPage(p.id);
    nav.appendChild(n);
    const pg=document.createElement('div');
    pg.className='pg'+(i===0?' act':'');
    pg.id=p.id;
    pgs.appendChild(pg);
  });
}
function goPage(id){
  document.querySelectorAll('.ni').forEach(n=>n.classList.toggle('act',n.getAttribute('data-pg')===id));
  document.querySelectorAll('.pg').forEach(p=>p.classList.toggle('act',p.id===id));
  renderPage(id);
}

const rendered={};
function renderPage(id){
  if(rendered[id])return;
  rendered[id]=true;
  const fns={p0:renderP0,p1:renderP1,p2:renderP2,p3:renderP3,p4:renderP4,
             p5:renderP5,p6:renderP6,p7:renderP7,p8:renderP8,p9:renderP9,
             p10:renderP10,p11:renderP11,p12:renderP12};
  if(fns[id])fns[id](gData);
}
function renderAll(){
  Object.keys(rendered).forEach(k=>delete rendered[k]);
  const act=document.querySelector('.pg.act');
  if(act)renderPage(act.id);
}

    <div class="kpi" style="--accent:var(--g)"><div class="lbl">相關營收</div><div class="val">${fmtK(rev)}</div><div class="sub">ROI ${roi}%</div></div>
    <div class="kpi" style="--accent:var(--w)"><div class="lbl">變動費用佔比</div><div class="val">${varPct}%</div><div class="sub">固定 ${(100-varPct).toFixed(1)}%</div></div>
    <div class="kpi" style="--accent:var(--d)"><div class="lbl">超支項目數</div><div class="val">${over}</div><div class="sub">共 ${data.length} 項</div></div>

// ─── IMPORT LOGIC ──────────────────────────────────────────────────────────
function openModal(){document.getElementById('impModal').classList.add('open')}
function closeModal(){document.getElementById('impModal').classList.remove('open');resetImport()}
function setMode(m){
  importMode=m;
  document.getElementById('modeReplace').classList.toggle('act',m==='replace');
  document.getElementById('modeAppend').classList.toggle('act',m==='append');
}

const FIELD_ALIASES={
  'Date':['Date','日期','date','DATE','transaction_date'],
  'Category':['Category','費用類別','科目','category','cat','type'],
  'Department':['Department','部門','department','dept','DEPT'],
  'Project':['Project','專案','project','proj'],
  'Actual_Amount':['Actual_Amount','實際金額','實際','actual','amount','金額','費用'],
  'Budget_Amount':['Budget_Amount','預算金額','預算','budget','bud'],
  'Region':['Region','地區','region','area'],
  'Employee_Count':['Employee_Count','人數','employees','emp_count','headcount'],
  'Cost_Type':['Cost_Type','費用性態','性態','cost_type','type','費用類型'],
  'Center':['Center','責任中心','center','cost_center'],
  'Revenue':['Revenue','營收','revenue','rev','income']
};
const REQUIRED=['Date','Category','Department','Actual_Amount'];

function handleFile(file){
  if(!file)return;
  const ext=file.name.split('.').pop().toLowerCase();
  if(ext==='csv'){
    const r=new FileReader();
    r.onload=e=>processCsv(e.target.result);
    r.readAsText(file,'UTF-8');
  } else if(['xlsx','xls'].includes(ext)){
    const r=new FileReader();
    r.onload=e=>{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
      parsedRows=rows;
      buildColMap(rows);
    };
    r.readAsArrayBuffer(file);
  } else {
    showVld('❌ 不支援此檔案格式，請使用 .csv / .xlsx / .xls','err');
  }
}

function processCsv(text){
  const lines=text.replace(/^\uFEFF/,'').split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2){showVld('❌ 檔案內容不足（至少需要標題列+1筆資料）','err');return}
  const headers=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  const rows=lines.slice(1).map(l=>{
    const vals=l.split(',').map(v=>v.trim().replace(/^"|"$/g,''));
    const obj={};headers.forEach((h,i)=>obj[h]=vals[i]||'');
    return obj;
  }).filter(r=>Object.values(r).some(v=>v));
  parsedRows=rows;
  buildColMap(rows);
}

function buildColMap(rows){
  if(!rows||!rows.length)return;
  const headers=Object.keys(rows[0]);
  const sec=document.getElementById('mapSection');sec.style.display='block';
  const mapDiv=document.getElementById('colMapRows');mapDiv.innerHTML='';
  colMap={};
  Object.keys(FIELD_ALIASES).forEach(field=>{
    const aliases=FIELD_ALIASES[field];
    const matched=headers.find(h=>aliases.map(a=>a.toLowerCase()).includes(h.toLowerCase()))||'';
    if(matched)colMap[field]=matched;
    const opts=`<option value="">（不對應）</option>`+headers.map(h=>`<option value="${h}" ${h===matched?'selected':''}>${h}</option>`).join('');
    const row=document.createElement('div');row.className='col-map';
    row.innerHTML=`<div style="color:var(--tx);font-weight:600">${field} <small style="color:var(--tx3);font-weight:400">${REQUIRED.includes(field)?'*':''}</small></div><div class="arrow">→</div><select id="map_${field}" onchange="updateMap('${field}',this.value)">${opts}</select>`;
    mapDiv.appendChild(row);
  });
  validateAndPreview(rows);
}

function updateMap(field,val){
  if(val)colMap[field]=val;else delete colMap[field];
  validateAndPreview(parsedRows);
}

function validateAndPreview(rows){
  const missing=REQUIRED.filter(f=>!colMap[f]);
  const vldDiv=document.getElementById('vldMsg');
  if(missing.length){
    vldDiv.innerHTML=`<div class="vld-msg err">⚠️ 缺少必要欄位對應：${missing.join(', ')}</div>`;
  } else {
    vldDiv.innerHTML=`<div class="vld-msg ok">✅ 欄位對應完整，共 ${rows.length} 筆資料可匯入（模式：${importMode==='replace'?'取代':'追加'}）</div>`;
  }
  // preview
  const preview=rows.slice(0,5);
  const mappedFields=Object.keys(colMap).filter(f=>colMap[f]);
  const pb=document.getElementById('previewBox');
  pb.innerHTML=`<table><thead><tr>${mappedFields.map(f=>`<th>${f}</th>`).join('')}</tr></thead><tbody>${preview.map(r=>`<tr>${mappedFields.map(f=>`<td>${r[colMap[f]]||''}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
}

function confirmImport(){
  const missing=REQUIRED.filter(f=>!colMap[f]);
  if(missing.length){showVld('❌ 請先完成必要欄位對應：'+missing.join(', '),'err');return}
  const mapped=parsedRows.map(r=>{
    const obj={Cost_Type:'固定',Center:'管理後台',Revenue:0,Region:'全區',Employee_Count:0,Budget_Amount:0,Project:''};
    Object.keys(colMap).forEach(f=>{
      const src=colMap[f];if(!src)return;
      const v=r[src];
      if(['Actual_Amount','Budget_Amount','Employee_Count','Revenue'].includes(f))obj[f]=+v||0;
      else obj[f]=v||'';
    });
    return obj;
  }).filter(r=>r.Date&&r.Category&&r.Department&&r.Actual_Amount);
  if(!mapped.length){showVld('❌ 沒有有效資料可匯入','err');return}
  if(importMode==='replace')gData=mapped;
  else gData=[...gData,...mapped];
  closeModal();
  renderAll();
  const pg=document.querySelector('.pg.act');
  if(pg&&pg.id==='p9')renderP9(); // refresh count
  alert(`✅ 匯入成功！${importMode==='replace'?'已取代':'已追加'} ${mapped.length} 筆資料，目前共 ${gData.length} 筆。`);
}

function showVld(msg,type){
  const d=document.getElementById('vldMsg');
  if(d)d.innerHTML=`<div class="vld-msg ${type}">${msg}</div>`;
}

function resetImport(){
  parsedRows=[];colMap={};
  document.getElementById('mapSection').style.display='none';
  document.getElementById('fileInput').value='';
}

function resetToDefault(){
  if(!confirm('確定要還原為預設示範資料？'))return;
  gData=JSON.parse(JSON.stringify(defaultData));
  renderAll();
  alert('✅ 已還原預設資料（'+gData.length+'筆）');
}

// ─── EXPORT ────────────────────────────────────────────────────────────────
function openExport(){
  const fields=['Date','Category','Department','Project','Actual_Amount','Budget_Amount','Region','Employee_Count','Cost_Type','Center','Revenue'];
  const bom='\uFEFF';
  const hdr=fields.join(',')+'\n';
  const body=gData.map(r=>fields.map(f=>{
    const v=r[f]===undefined?'':r[f];
    return String(v).includes(',')?`"${v}"`:v;
  }).join(',')).join('\n');
  const blob=new Blob([bom+hdr+body],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='Expense_Data_Export_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();URL.revokeObjectURL(a.href);
}

// ─── INIT ───────────────────────────────────────────────────────────────────
buildLayout();
renderPage('p0');
</script>

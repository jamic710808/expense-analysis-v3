<!DOCTYPE html>
<html lang="zh-TW" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>企業費用分析儀表板 V5</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #0f1117;
      --bg2: #1a1d27;
      --bg3: #222635;
      --bd: #2e3248;
      --tx: #e2e8f0;
      --tx2: #94a3b8;
      --tx3: #64748b;
      --p: #6366f1;
      --pa: #818cf8;
      --ps: #c7d2fe;
      --a: #22d3ee;
      --w: #f59e0b;
      --d: #ef4444;
      --g: #10b981;
      --fix: #6366f1;
      --var: #f59e0b;
      --cf: #10b981;
      --cc: #6366f1;
      --cm: #94a3b8;
      --r: 10px;
      --r2: 6px;
      --sh: 0 4px 24px rgba(0, 0, 0, .4)
    }

    [data-theme="light"] {
      --bg: #F5F0EB;
      --bg2: #FFFFFF;
      --bg3: #EDE8E3;
      --bd: #D4CFC9;
      --tx: #1E293B;
      --tx2: #475569;
      --tx3: #94A3B8;
      --p: #4F52C8;
      --pa: #6366f1;
      --ps: #818cf8;
      --a: #0891B2;
      --w: #D97706;
      --d: #DC2626;
      --g: #059669;
      --fix: #4F52C8;
      --var: #D97706;
      --cf: #059669;
      --cc: #4F52C8;
      --cm: #64748b;
      --sh: 0 4px 20px rgba(0, 0, 0, .10)
    }

    body {
      background: var(--bg);
      color: var(--tx);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column
    }

    /* STICKY TOP WRAPPER */
    #topBar {
      position: sticky;
      top: 0;
      z-index: 100
    }

    /* NAV */
    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 8px 14px;
      background: var(--bg2);
      border-bottom: 1px solid var(--bd);
      align-items: center
    }

    nav .ni {
      cursor: pointer;
      padding: 6px 12px;
      border-radius: var(--r2);
      font-size: .78rem;
      color: var(--tx2);
      transition: all .2s;
      white-space: nowrap
    }

    nav .ni:hover {
      background: var(--bg3);
      color: var(--tx)
    }

    nav .ni.act {
      background: var(--p);
      color: #fff;
      font-weight: 600
    }

    /* THEME BUTTON */
    .theme-btn {
      margin-left: auto;
      padding: 5px 11px;
      border-radius: var(--r2);
      background: var(--bg3);
      border: 1px solid var(--bd);
      color: var(--tx2);
      cursor: pointer;
      font-size: .8rem;
      font-weight: 600;
      transition: all .2s;
      white-space: nowrap;
      flex-shrink: 0
    }

    .theme-btn:hover {
      border-color: var(--p);
      color: var(--tx)
    }

    /* FILTER BAR */
    .filter-bar {
      background: var(--bg2);
      border-bottom: 1px solid var(--bd);
      padding: 6px 14px
    }

    .filter-bar.hidden {
      display: none
    }

    .fb-inner {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap
    }

    .fb-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      flex: 1;
      align-items: center
    }

    .fb-actions {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-left: auto
    }

    .fctl {
      display: flex;
      align-items: center;
      gap: 5px
    }

    .fctl-lbl {
      font-size: .63rem;
      color: var(--tx3);
      white-space: nowrap;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em
    }

    .fctl-sep {
      color: var(--tx3);
      padding: 0 1px;
      font-size: .8rem
    }

    .fsel {
      background: var(--bg3);
      border: 1px solid var(--bd);
      color: var(--tx);
      padding: 3px 6px;
      border-radius: var(--r2);
      font-size: .72rem;
      cursor: pointer;
      outline: none;
      transition: border-color .2s
    }

    .fsel:focus {
      border-color: var(--p)
    }

    /* MULTI-SELECT DROPDOWN */
    .fdd {
      position: relative
    }

    .fdd-btn {
      background: var(--bg3);
      border: 1px solid var(--bd);
      color: var(--tx2);
      padding: 3px 9px;
      border-radius: var(--r2);
      font-size: .72rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: all .2s;
      white-space: nowrap
    }

    .fdd-btn:hover,
    .fdd.open .fdd-btn {
      border-color: var(--p);
      color: var(--tx)
    }

    .fdd.has-sel .fdd-btn {
      border-color: var(--p);
      background: rgba(99, 102, 241, .12);
      color: var(--p)
    }

    [data-theme="light"] .fdd.has-sel .fdd-btn {
      background: rgba(79, 82, 200, .10);
      color: var(--p)
    }

    .fdd-arrow {
      font-size: .58rem;
      transition: transform .2s;
      opacity: .7
    }

    .fdd.open .fdd-arrow {
      transform: rotate(180deg)
    }

    .fdd-menu {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      background: var(--bg2);
      border: 1px solid var(--bd);
      border-radius: var(--r);
      padding: 4px;
      min-width: 145px;
      max-height: 230px;
      overflow-y: auto;
      box-shadow: var(--sh);
      z-index: 300
    }

    .fdd.open .fdd-menu {
      display: block;
      animation: fi .15s ease
    }

    .fdd-item {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 5px 7px;
      border-radius: var(--r2);
      cursor: pointer;
      font-size: .75rem;
      color: var(--tx2);
      transition: background .12s;
      white-space: nowrap
    }

    .fdd-item:hover {
      background: var(--bg3);
      color: var(--tx)
    }

    .fdd-item input[type=checkbox] {
      accent-color: var(--p);
      cursor: pointer;
      width: 13px;
      height: 13px;
      flex-shrink: 0
    }

    /* COST TYPE TOGGLE */
    .f-tgl-grp {
      display: flex;
      border: 1px solid var(--bd);
      border-radius: var(--r2);
      overflow: hidden
    }

    .f-tgl {
      padding: 3px 9px;
      font-size: .71rem;
      border: none;
      cursor: pointer;
      background: var(--bg3);
      color: var(--tx3);
      transition: all .2s
    }

    .f-tgl:hover {
      background: var(--bd);
      color: var(--tx)
    }

    .f-tgl.act {
      background: var(--p);
      color: #fff;
      font-weight: 600
    }

    /* FILTER COUNT */
    .fc-badge {
      font-size: .67rem;
      padding: 2px 8px;
      border-radius: 20px;
      background: rgba(99, 102, 241, .15);
      color: var(--pa);
      font-weight: 700
    }

    .fc-cnt {
      font-size: .69rem;
      color: var(--tx3)
    }

    .btn-sm {
      padding: 4px 10px !important;
      font-size: .72rem !important
    }

    /* PAGES */
    .pg {
      display: none;
      padding: 20px;
      flex: 1;
      animation: fi .25s ease
    }

    .pg.act {
      display: block
    }

    @keyframes fi {
      from {
        opacity: 0;
        transform: translateY(6px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    /* KPI CARDS */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 20px
    }

    .kpi {
      background: var(--bg2);
      border: 1px solid var(--bd);
      border-radius: var(--r);
      padding: 16px;
      position: relative;
      overflow: hidden
    }

    .kpi::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--accent, var(--p))
    }

    .kpi .lbl {
      font-size: .72rem;
      color: var(--tx3);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 6px
    }

    .kpi .val {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--tx)
    }

    .kpi .sub {
      font-size: .72rem;
      color: var(--tx3);
      margin-top: 4px
    }

    .kpi .badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 20px;
      font-size: .7rem;
      font-weight: 600;
      margin-top: 6px
    }

    .badge.pos {
      background: rgba(16, 185, 129, .15);
      color: #10b981
    }

    .badge.neg {
      background: rgba(239, 68, 68, .15);
      color: #ef4444
    }

    .badge.neu {
      background: rgba(148, 163, 184, .15);
      color: #94a3b8
    }

    /* GRID */
    .grid {
      display: grid;
      gap: 16px;
      margin-bottom: 16px
    }

    .g2 {
      grid-template-columns: 1fr 1fr
    }

    .g3 {
      grid-template-columns: 1fr 1fr 1fr
    }

    .g31 {
      grid-template-columns: 2fr 1fr
    }

    .g13 {
      grid-template-columns: 1fr 2fr
    }

    @media(max-width:768px) {

      .g2,
      .g3,
      .g31,
      .g13 {
        grid-template-columns: 1fr
      }
    }

    /* CARD */
    .card {
      background: var(--bg2);
      border: 1px solid var(--bd);
      border-radius: var(--r);
      padding: 16px
    }

    .card h3 {
      font-size: .85rem;
      font-weight: 600;
      color: var(--tx2);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px
    }

    .card h3 span {
      font-size: .75rem;
      background: var(--bg3);
      padding: 2px 8px;
      border-radius: 20px;
      color: var(--tx3)
    }

    .ch-wrap {
      position: relative;
      height: 220px
    }

    .ch-wrap.tall {
      height: 300px
    }

    /* TABLE */
    .tbl-wrap {
      overflow-x: auto;
      max-height: 400px;
      overflow-y: auto
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .8rem
    }

    th {
      background: var(--bg3);
      color: var(--tx2);
      padding: 8px 12px;
      text-align: left;
      position: sticky;
      top: 0;
      font-weight: 600;
      border-bottom: 1px solid var(--bd)
    }

    td {
      padding: 8px 12px;
      border-bottom: 1px solid var(--bd);
      color: var(--tx2)
    }

    tr:hover td {
      background: rgba(255, 255, 255, .03)
    }

    td.num {
      text-align: right;
      font-variant-numeric: tabular-nums
    }

    td.pos {
      color: var(--g)
    }

    td.neg {
      color: var(--d)
    }

    [data-theme="light"] tr:hover td {
      background: rgba(0, 0, 0, .025)
    }

    /* PILLS */
    .pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: .7rem;
      font-weight: 600
    }

    .pill.fix {
      background: rgba(99, 102, 241, .2);
      color: #818cf8
    }

    .pill.var {
      background: rgba(245, 158, 11, .2);
      color: #f59e0b
    }

    .pill.cf {
      background: rgba(16, 185, 129, .2);
      color: #10b981
    }

    .pill.cc {
      background: rgba(99, 102, 241, .2);
      color: #818cf8
    }

    .pill.cm {
      background: rgba(148, 163, 184, .2);
      color: #94a3b8
    }

    /* PROGRESS BAR */
    .prog {
      background: var(--bg3);
      border-radius: 4px;
      height: 8px;
      overflow: hidden;
      margin-top: 4px
    }

    .prog-bar {
      height: 100%;
      border-radius: 4px;
      transition: width .6s ease
    }

    /* IMPORT MODAL */
    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .7);
      z-index: 200;
      align-items: center;
      justify-content: center
    }

    .modal-bg.open {
      display: flex
    }

    .modal {
      background: var(--bg2);
      border: 1px solid var(--bd);
      border-radius: var(--r);
      padding: 24px;
      width: min(700px, 95vw);
      max-height: 90vh;
      overflow-y: auto
    }

    .modal h2 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--tx)
    }

    .modal-close {
      float: right;
      background: none;
      border: none;
      color: var(--tx3);
      font-size: 1.2rem;
      cursor: pointer;
      margin-top: -4px
    }

    .modal-close:hover {
      color: var(--tx)
    }

    /* toggle */
    .toggle-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px
    }

    .tgl {
      flex: 1;
      padding: 8px;
      border-radius: var(--r2);
      border: 1px solid var(--bd);
      background: var(--bg3);
      color: var(--tx2);
      cursor: pointer;
      font-size: .82rem;
      text-align: center;
      transition: all .2s
    }

    .tgl.act {
      background: var(--p);
      border-color: var(--p);
      color: #fff;
      font-weight: 600
    }

    /* drop zone */
    .drop-zone {
      border: 2px dashed var(--bd);
      border-radius: var(--r);
      padding: 32px;
      text-align: center;
      color: var(--tx3);
      cursor: pointer;
      transition: all .2s;
      margin-bottom: 16px
    }

    .drop-zone:hover,
    .drop-zone.drag {
      border-color: var(--p);
      background: rgba(99, 102, 241, .05);
      color: var(--tx2)
    }

    .drop-zone .ico {
      font-size: 2rem;
      margin-bottom: 8px
    }

    /* col map */
    .col-map {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
      font-size: .8rem
    }

    .col-map select {
      background: var(--bg3);
      border: 1px solid var(--bd);
      color: var(--tx);
      padding: 5px 8px;
      border-radius: var(--r2);
      font-size: .78rem
    }

    .col-map select:focus {
      outline: 1px solid var(--p)
    }

    .arrow {
      color: var(--p)
    }

    /* preview */
    .preview-box {
      background: var(--bg3);
      border-radius: var(--r2);
      padding: 10px;
      margin-bottom: 12px;
      overflow-x: auto;
      font-size: .75rem
    }

    .preview-box table th {
      background: transparent;
      color: var(--p);
      font-size: .72rem
    }

    /* validation */
    .vld-msg {
      padding: 8px 12px;
      border-radius: var(--r2);
      font-size: .78rem;
      margin-bottom: 10px
    }

    .vld-msg.ok {
      background: rgba(16, 185, 129, .15);
      color: #10b981
    }

    .vld-msg.err {
      background: rgba(239, 68, 68, .15);
      color: #ef4444
    }

    .vld-msg.warn {
      background: rgba(245, 158, 11, .15);
      color: #f59e0b
    }

    /* BUTTONS */
    .btn {
      padding: 8px 18px;
      border-radius: var(--r2);
      border: none;
      cursor: pointer;
      font-size: .82rem;
      font-weight: 600;
      transition: all .2s
    }

    .btn-p {
      background: var(--p);
      color: #fff
    }

    .btn-p:hover {
      background: var(--pa)
    }

    .btn-g {
      background: rgba(16, 185, 129, .15);
      color: #10b981;
      border: 1px solid rgba(16, 185, 129, .3)
    }

    .btn-g:hover {
      background: rgba(16, 185, 129, .25)
    }

    .btn-ghost {
      background: transparent;
      color: var(--tx2);
      border: 1px solid var(--bd)
    }

    .btn-ghost:hover {
      background: var(--bg3)
    }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      flex-wrap: wrap
    }

    /* SECTION TITLE */
    .sec-title {
      font-size: .7rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--tx3);
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--bd)
    }

    /* scatter tooltip */
    .tooltip-custom {
      position: absolute;
      background: var(--bg3);
      border: 1px solid var(--bd);
      border-radius: var(--r2);
      padding: 8px 12px;
      font-size: .75rem;
      pointer-events: none;
      z-index: 50
    }

    /* SCROLLBAR */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px
    }

    ::-webkit-scrollbar-track {
      background: var(--bg)
    }

    ::-webkit-scrollbar-thumb {
      background: var(--bd);
      border-radius: 3px
    }

    [data-theme="light"] ::-webkit-scrollbar-track {
      background: var(--bg3)
    }

    [data-theme="light"] ::-webkit-scrollbar-thumb {
      background: #BDB8B2
    }

    /* LIGHT THEME OVERRIDES */
    [data-theme="light"] .badge.pos {
      background: rgba(5, 150, 105, .12);
      color: #059669
    }

    [data-theme="light"] .badge.neg {
      background: rgba(220, 38, 38, .12);
      color: #DC2626
    }

    [data-theme="light"] .badge.neu {
      background: rgba(100, 116, 139, .12);
      color: #64748b
    }

    [data-theme="light"] .pill.fix {
      background: rgba(79, 82, 200, .12);
      color: #4F52C8
    }

    [data-theme="light"] .pill.var {
      background: rgba(217, 119, 6, .12);
      color: #D97706
    }

    [data-theme="light"] .pill.cf {
      background: rgba(5, 150, 105, .12);
      color: #059669
    }

    [data-theme="light"] .pill.cc {
      background: rgba(79, 82, 200, .12);
      color: #4F52C8
    }

    [data-theme="light"] .pill.cm {
      background: rgba(100, 116, 139, .12);
      color: #64748b
    }

    [data-theme="light"] .vld-msg.ok {
      background: rgba(5, 150, 105, .12);
      color: #059669
    }

    [data-theme="light"] .vld-msg.err {
      background: rgba(220, 38, 38, .12);
      color: #DC2626
    }

    [data-theme="light"] .vld-msg.warn {
      background: rgba(217, 119, 6, .12);
      color: #D97706
    }

    [data-theme="light"] .btn-g {
      background: rgba(5, 150, 105, .10);
      color: #059669;
      border-color: rgba(5, 150, 105, .3)
    }

    [data-theme="light"] .fc-badge {
      background: rgba(79, 82, 200, .12);
      color: #4F52C8
    }

    /* page header */
    .pg-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      flex-wrap: wrap;
      gap: 8px
    }

    .pg-hdr h2 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--tx)
    }

    .pg-hdr .pg-sub {
      font-size: .78rem;
      color: var(--tx3)
    }

    /* badge row */
    .legend-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
      font-size: .75rem
    }

    .leg {
      display: flex;
      align-items: center;
      gap: 4px;
      color: var(--tx2)
    }

    .leg-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0
    }

    /* input range */
    input[type=range] {
      accent-color: var(--p);
      width: 100%
    }

    /* ── AI PANEL ───────────────────────────────────────────────────────────── */
    .ai-panel {
      position: fixed;
      top: 0;
      right: -420px;
      width: 420px;
      height: 100vh;
      background: var(--bg2);
      border-left: 1px solid var(--bd);
      box-shadow: -6px 0 32px rgba(0, 0, 0, .35);
      z-index: 500;
      display: flex;
      flex-direction: column;
      transition: right .32s cubic-bezier(.4, 0, .2, 1)
    }

    .ai-panel.open {
      right: 0
    }

    .ai-ph {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--bd);
      background: var(--bg3);
      flex-shrink: 0
    }

    .ai-ph .ai-logo {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--p), var(--a));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0
    }

    .ai-ph .ai-title {
      font-size: .88rem;
      font-weight: 700;
      color: var(--tx);
      flex: 1
    }

    .ai-ph .ai-page-tag {
      font-size: .68rem;
      padding: 2px 8px;
      border-radius: 20px;
      background: rgba(99, 102, 241, .15);
      color: var(--pa);
      font-weight: 600
    }

    [data-theme="light"] .ai-ph .ai-page-tag {
      background: rgba(79, 82, 200, .12);
      color: var(--p)
    }

    .ai-close-btn {
      background: none;
      border: none;
      color: var(--tx3);
      cursor: pointer;
      font-size: 1.15rem;
      padding: 4px;
      border-radius: 4px;
      line-height: 1;
      transition: color .2s
    }

    .ai-close-btn:hover {
      color: var(--tx)
    }

    .ai-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px
    }

    /* messages */
    .ai-msg {
      display: flex;
      flex-direction: column;
      gap: 3px;
      animation: fi .2s ease
    }

    .ai-msg-role {
      font-size: .63rem;
      text-transform: uppercase;
      letter-spacing: .07em;
      font-weight: 700;
      color: var(--tx3);
      padding: 0 2px
    }

    .ai-msg-bubble {
      padding: 11px 14px;
      border-radius: 10px;
      font-size: .82rem;
      line-height: 1.65;
      color: var(--tx)
    }

    .ai-msg.user .ai-msg-bubble {
      background: rgba(99, 102, 241, .12);
      border: 1px solid rgba(99, 102, 241, .2);
      align-self: flex-end;
      border-radius: 10px 10px 2px 10px;
      max-width: 90%
    }

    [data-theme="light"] .ai-msg.user .ai-msg-bubble {
      background: rgba(79, 82, 200, .09);
      border-color: rgba(79, 82, 200, .18)
    }

    .ai-msg.assistant .ai-msg-bubble {
      background: var(--bg3);
      border: 1px solid var(--bd);
      border-radius: 10px 10px 10px 2px
    }

    /* loading dots */
    .ai-dots {
      display: inline-flex;
      gap: 4px;
      align-items: center;
      padding: 4px 0
    }

    .ai-dots span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--pa);
      animation: aidot 1.2s infinite
    }

    .ai-dots span:nth-child(2) {
      animation-delay: .2s
    }

    .ai-dots span:nth-child(3) {
      animation-delay: .4s
    }

    @keyframes aidot {

      0%,
      80%,
      100% {
        transform: scale(.6);
        opacity: .4
      }

      40% {
        transform: scale(1);
        opacity: 1
      }
    }

    /* markdown inside bubble */
    .ai-md h1,
    .ai-md h2,
    .ai-md h3 {
      font-size: .88rem;
      font-weight: 700;
      margin: .6em 0 .3em;
      color: var(--tx)
    }

    .ai-md p {
      margin: .3em 0
    }

    .ai-md ul,
    .ai-md ol {
      margin: .3em 0 .3em 1.2em
    }

    .ai-md li {
      margin: .18em 0
    }

    .ai-md strong {
      font-weight: 700;
      color: var(--tx)
    }

    .ai-md em {
      font-style: italic;
      color: var(--tx2)
    }

    .ai-md code {
      background: var(--bg);
      padding: 1px 5px;
      border-radius: 3px;
      font-family: monospace;
      font-size: .8em
    }

    .ai-md hr {
      border: none;
      border-top: 1px solid var(--bd);
      margin: .6em 0
    }

    .ai-md .ai-tag {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 20px;
      font-size: .72em;
      font-weight: 700;
      background: rgba(99, 102, 241, .15);
      color: var(--pa);
      margin: 0 1px
    }

    [data-theme="light"] .ai-md .ai-tag {
      background: rgba(79, 82, 200, .11);
      color: var(--p)
    }

    .ai-md .ai-warn {
      color: var(--w)
    }

    /* quick replies */
    .ai-qr {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 2px 0
    }

    .ai-qr-btn {
      padding: 5px 11px;
      border-radius: 20px;
      border: 1px solid var(--bd);
      background: var(--bg3);
      color: var(--tx2);
      font-size: .74rem;
      cursor: pointer;
      transition: all .18s;
      white-space: nowrap
    }

    .ai-qr-btn:hover {
      border-color: var(--p);
      color: var(--p);
      background: rgba(99, 102, 241, .08)
    }

    /* footer: input */
    .ai-footer {
      border-top: 1px solid var(--bd);
      padding: 12px 14px;
      background: var(--bg2);
      flex-shrink: 0
    }

    .ai-input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end
    }

    .ai-input {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--bd);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--tx);
      font-size: .82rem;
      resize: none;
      min-height: 38px;
      max-height: 110px;
      outline: none;
      font-family: inherit;
      transition: border-color .2s;
      line-height: 1.5
    }

    .ai-input:focus {
      border-color: var(--p)
    }

    .ai-send-btn {
      padding: 8px 14px;
      background: var(--p);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: .82rem;
      font-weight: 600;
      transition: background .2s;
      white-space: nowrap;
      flex-shrink: 0
    }

    .ai-send-btn:hover {
      background: var(--pa)
    }

    .ai-send-btn:disabled {
      opacity: .45;
      cursor: not-allowed
    }

    .ai-foot-info {
      font-size: .65rem;
      color: var(--tx3);
      margin-top: 6px;
      display: flex;
      justify-content: space-between
    }

    /* AI trigger button in page header */
    .ai-trigger-btn {
      padding: 6px 14px;
      border-radius: var(--r2);
      border: 1px solid var(--p);
      background: rgba(99, 102, 241, .08);
      color: var(--pa);
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: all .2s;
      white-space: nowrap
    }

    .ai-trigger-btn:hover {
      background: rgba(99, 102, 241, .18);
      color: #fff
    }

    [data-theme="light"] .ai-trigger-btn {
      background: rgba(79, 82, 200, .07);
      color: var(--p)
    }

    [data-theme="light"] .ai-trigger-btn:hover {
      background: rgba(79, 82, 200, .15)
    }

    /* AI settings button in nav */
    .ai-settings-btn {
      padding: 5px 11px;
      border-radius: var(--r2);
      background: var(--bg3);
      border: 1px solid var(--bd);
      color: var(--tx2);
      cursor: pointer;
      font-size: .8rem;
      font-weight: 600;
      transition: all .2s;
      white-space: nowrap;
      flex-shrink: 0;
      margin-left: 4px
    }

    .ai-settings-btn:hover {
      border-color: var(--p);
      color: var(--tx)
    }

    /* ── AI SETTINGS MODAL ──────────────────────────────────────────────────── */
    .ai-modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .65);
      z-index: 600;
      align-items: center;
      justify-content: center
    }

    .ai-modal-bg.open {
      display: flex
    }

    .ai-modal {
      background: var(--bg2);
      border: 1px solid var(--bd);
      border-radius: var(--r);
      padding: 0;
      width: min(480px, 95vw);
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--sh)
    }

    .ai-modal-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--bd);
      background: var(--bg3)
    }

    .ai-modal-hdr h2 {
      font-size: .95rem;
      font-weight: 700;
      color: var(--tx)
    }

    .ai-modal-body {
      padding: 20px
    }

    .ai-fld {
      margin-bottom: 16px
    }

    .ai-fld label {
      display: block;
      font-size: .74rem;
      font-weight: 700;
      color: var(--tx2);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .05em
    }

    .ai-fld input,
    .ai-fld select,
    .ai-fld textarea {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--bd);
      color: var(--tx);
      padding: 8px 12px;
      border-radius: var(--r2);
      font-size: .82rem;
      outline: none;
      transition: border-color .2s;
      font-family: inherit
    }

    .ai-fld input:focus,
    .ai-fld select:focus,
    .ai-fld textarea:focus {
      border-color: var(--p)
    }

    .ai-fld input[type=range] {
      padding: 4px 0;
      border: none;
      background: transparent
    }

    /* provider tabs */
    .ai-prov-tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 16px
    }

    .ai-prov-tab {
      padding: 7px 14px;
      border-radius: var(--r2);
      border: 1px solid var(--bd);
      background: var(--bg3);
      color: var(--tx2);
      font-size: .78rem;
      cursor: pointer;
      font-weight: 600;
      transition: all .2s
    }

    .ai-prov-tab:hover {
      border-color: var(--p);
      color: var(--tx)
    }

    .ai-prov-tab.act {
      background: var(--p);
      border-color: var(--p);
      color: #fff
    }

    /* test status */
    .ai-test-status {
      margin-top: 8px;
      font-size: .78rem;
      border-radius: var(--r2);
      padding: 7px 12px
    }

    .ai-test-status.ok {
      background: rgba(16, 185, 129, .12);
      color: var(--g)
    }

    .ai-test-status.err {
      background: rgba(239, 68, 68, .12);
      color: var(--d)
    }

    .ai-test-status.testing {
      background: rgba(99, 102, 241, .10);
      color: var(--pa)
    }

    /* toast */
    .ai-toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      padding: 9px 20px;
      border-radius: 30px;
      font-size: .82rem;
      font-weight: 600;
      z-index: 700;
      opacity: 0;
      transition: all .3s;
      pointer-events: none;
      white-space: nowrap
    }

    .ai-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0)
    }

    .ai-toast.ok {
      background: rgba(16, 185, 129, .9);
      color: #fff
    }

    .ai-toast.err {
      background: rgba(239, 68, 68, .9);
      color: #fff
    }

    .ai-toast.info {
      background: rgba(99, 102, 241, .9);
      color: #fff
    }

    /* AI 思考過程區塊 */
    .ai-thought {
      margin: 6px 0 10px;
      border-radius: 8px;
      border: 1px solid rgba(124, 58, 237, 0.25);
      background: rgba(124, 58, 237, 0.07);
      backdrop-filter: blur(4px);
      overflow: hidden;
      font-size: 0.76rem;
    }

    .ai-thought-hd {
      padding: 4px 10px;
      background: rgba(124, 58, 237, 0.14);
      color: #c4b5fd;
      font-weight: 600;
      font-size: 0.72rem;
      letter-spacing: 0.03em;
    }

    [data-theme="light"] .ai-thought-hd {
      color: #7c3aed;
    }

    .ai-thought-bd {
      padding: 6px 10px;
      color: #94a3b8;
      white-space: pre-wrap;
      line-height: 1.55;
      max-height: 140px;
      overflow-y: auto;
    }

    [data-theme="light"] .ai-thought-bd {
      color: #64748b;
    }

    /* ── AI STATUS BADGE ─────────────────────────────────────────── */
    .ai-status-badge { font-size:.68rem; padding:2px 8px; border-radius:10px; font-weight:600; }
    .ai-status-badge.idle  { background:rgba(100,116,139,.15); color:var(--tx3); }
    .ai-status-badge.ready { background:rgba(16,185,129,.15); color:var(--g); }
    .ai-status-badge.busy  { background:rgba(245,158,11,.15); color:var(--w); animation:ai-blink 1s infinite; }
    .ai-status-badge.error { background:rgba(239,68,68,.15); color:var(--d); }
    @keyframes ai-blink { 0%,100% { opacity:1 } 50% { opacity:.4 } }

    /* ── AI INLINE CONFIG (collapsible in panel) ─────────────────── */
    .ai-cfg-section { border-bottom:1px solid var(--bd); background:rgba(0,0,0,.15); flex-shrink:0; }
    .ai-cfg-toggle { display:flex; align-items:center; justify-content:space-between; padding:7px 14px; cursor:pointer; font-size:.78rem; color:var(--tx2); user-select:none; transition:color .2s; }
    .ai-cfg-toggle:hover { color:var(--tx); }
    .ai-cfg-arrow { font-size:.7rem; transition:transform .2s ease; }
    .ai-cfg-arrow.collapsed { transform:rotate(-90deg); }
    .ai-cfg-body { overflow:hidden; transition:max-height .25s ease,opacity .2s ease; max-height:500px; opacity:1; padding:4px 14px 10px; }
    .ai-cfg-body.collapsed { max-height:0; opacity:0; padding:0 14px; }
    .ai-cfg-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
    .ai-cfg-lbl { font-size:.7rem; color:var(--tx3); width:56px; flex-shrink:0; }
    .ai-cfg-row select,.ai-cfg-row input[type="text"],.ai-cfg-row input[type="password"] {
      flex:1; background:var(--bg); border:1px solid var(--bd); color:var(--tx); padding:5px 8px;
      border-radius:var(--r2); font-size:.72rem; outline:none; transition:border-color .2s; font-family:inherit;
    }
    .ai-cfg-row select:focus,.ai-cfg-row input:focus { border-color:var(--p); }
    .ai-cfg-row input[type="checkbox"] { width:15px; height:15px; accent-color:var(--p); cursor:pointer; }
    .ai-eye-btn { background:none; border:none; color:var(--tx3); cursor:pointer; font-size:.85rem; padding:0 3px; }
    .ai-eye-btn:hover { color:var(--tx); }
    .ai-adv-toggle { font-size:.7rem; color:var(--tx3); cursor:pointer; padding:2px 0; display:flex; align-items:center; gap:4px; background:none; border:none; font-family:inherit; }
    .ai-adv-toggle:hover { color:var(--tx2); }
    .ai-adv-body { display:none; }
    .ai-adv-body.open { display:block; }
    .ai-cfg-acts { display:flex; gap:6px; justify-content:flex-end; margin-top:6px; }
    .ai-cfg-btn { font-size:.68rem; padding:3px 8px; border-radius:var(--r2); cursor:pointer; background:var(--bg); border:1px solid var(--bd); color:var(--tx3); transition:all .2s; font-family:inherit; }
    .ai-cfg-btn:hover { border-color:var(--p); color:var(--p); }
    .ai-cfg-btn.danger:hover { border-color:var(--d); color:var(--d); }

    /* ── AI CONTEXT BAR ──────────────────────────────────────────── */
    .ai-ctx-bar { padding:5px 14px; background:rgba(99,102,241,.08); border-bottom:1px solid var(--bd); flex-shrink:0; font-size:.72rem; color:var(--pa); display:flex; align-items:center; gap:5px; }
    [data-theme="light"] .ai-ctx-bar { background:rgba(79,82,200,.06); color:var(--p); }

    /* ── PANEL QUICK BUTTONS ─────────────────────────────────────── */
    .ai-quick-row { display:flex; flex-wrap:wrap; gap:5px; padding:8px 14px; flex-shrink:0; border-bottom:1px solid var(--bd); }
    .ai-qb { font-size:.68rem; padding:3px 9px; border-radius:20px; cursor:pointer; white-space:nowrap; transition:all .2s; font-family:inherit; }
    .ai-qb.primary { background:rgba(99,102,241,.15); border:1px solid rgba(99,102,241,.3); color:var(--pa); }
    .ai-qb.primary:hover { background:rgba(99,102,241,.28); border-color:var(--pa); }
    .ai-qb.normal { background:var(--bg3); border:1px solid var(--bd); color:var(--tx2); }
    .ai-qb.normal:hover { border-color:var(--p); color:var(--p); }
    [data-theme="light"] .ai-qb.primary { background:rgba(79,82,200,.08); border-color:rgba(79,82,200,.2); color:var(--p); }
    .ai-pulse { width:6px; height:6px; border-radius:50%; background:var(--pa); display:inline-block; margin-right:3px; animation:ai-blink .8s infinite; }

    /* ── TOKEN HINT ──────────────────────────────────────────────── */
    .ai-token-hint { font-size:.63rem; color:var(--tx3); text-align:right; padding:2px 14px; flex-shrink:0; }

    /* ── STOP BUTTON ─────────────────────────────────────────────── */
    .ai-stop-btn { padding:8px 12px; background:rgba(239,68,68,.15); border:1px solid rgba(239,68,68,.3); border-radius:var(--r2); color:var(--d); cursor:pointer; font-size:.78rem; font-weight:600; transition:all .2s; flex-shrink:0; }
    .ai-stop-btn:hover { background:rgba(239,68,68,.28); }

    /* ── ACTION ROW ──────────────────────────────────────────────── */
    .ai-act-row { display:flex; gap:6px; margin-top:6px; align-items:center; }
    .ai-act-btn { font-size:.68rem; padding:3px 8px; border-radius:var(--r2); cursor:pointer; background:var(--bg3); border:1px solid var(--bd); color:var(--tx3); transition:all .2s; font-family:inherit; }
    .ai-act-btn:hover { border-color:var(--p); color:var(--p); }

    /* ── FLOATING TOGGLE BUTTON ──────────────────────────────────── */
    #aiFloatBtn { position:fixed; right:0; bottom:80px; z-index:490; background:linear-gradient(135deg,#6366f1,#4f46e5); color:#fff; border:none; border-radius:14px 0 0 14px; padding:11px 9px; cursor:pointer; font-size:18px; box-shadow:-2px 2px 12px rgba(99,102,241,.5); transition:all .25s; writing-mode:vertical-rl; display:flex; flex-direction:column; align-items:center; gap:4px; }
    #aiFloatBtn:hover { background:linear-gradient(135deg,#4f46e5,#4338ca); padding-right:13px; }
    .ai-float-lbl { font-size:.68rem; letter-spacing:.05em; writing-mode:vertical-rl; margin-top:2px; }
  </style>
</head>

<body>

  <div id="topBar">
    <nav id="nav"></nav>
    <div id="filterBar" class="filter-bar"></div>
  </div>

  <div id="pages"></div>

  <!-- IMPORT MODAL -->
  <div class="modal-bg" id="impModal">
    <div class="modal">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <h2>📥 資料匯入</h2>
      <div class="toggle-row">
        <div class="tgl act" id="modeReplace" onclick="setMode('replace')">🔄 取代模式<br><small>清除舊資料，載入新資料</small></div>
        <div class="tgl" id="modeAppend" onclick="setMode('append')">➕ 追加模式<br><small>保留舊資料，新增筆數</small></div>
      </div>
      <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()"
        ondragover="event.preventDefault();this.classList.add('drag')" ondragleave="this.classList.remove('drag')"
        ondrop="event.preventDefault();this.classList.remove('drag');handleFile(event.dataTransfer.files[0])">
        <div class="ico">📁</div>
        <div>拖曳 CSV / Excel 至此，或點擊選擇檔案</div>
        <div style="font-size:.72rem;margin-top:4px">支援 .csv / .xlsx / .xls</div>
      </div>
      <input type="file" id="fileInput" accept=".csv,.xlsx,.xls" style="display:none"
        onchange="handleFile(this.files[0])">

      <div id="mapSection" style="display:none">
        <div class="sec-title">欄位對應</div>
        <div id="colMapRows"></div>
        <div id="vldMsg"></div>
        <div class="sec-title" style="margin-top:10px">資料預覽（前5筆）</div>
        <div class="preview-box" id="previewBox"></div>
        <div class="btn-row">
          <button class="btn btn-p" onclick="confirmImport()">✅ 確認匯入</button>
          <button class="btn btn-ghost" onclick="resetImport()">↩ 重新選擇</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── AI PANEL ─────────────────────────────────────────────────────────── -->
  <div class="ai-panel" id="aiPanel">

    <!-- Header -->
    <div class="ai-ph">
      <div class="ai-logo">🤖</div>
      <div class="ai-title">AI 費用分析師</div>
      <span id="aiStatusBadge" class="ai-status-badge ready">● 就緒</span>
      <span class="ai-page-tag" id="aiPageTag">總覽</span>
      <button class="ai-close-btn" onclick="closeAIPanel()" title="關閉">✕</button>
    </div>

    <!-- Inline Config (collapsible) -->
    <div class="ai-cfg-section">
      <div class="ai-cfg-toggle" onclick="toggleAICfgSection()">
        <span>⚙️ AI 設定</span>
        <span id="aiCfgArrow" class="ai-cfg-arrow collapsed">▾</span>
      </div>
      <div id="aiCfgBody" class="ai-cfg-body collapsed">
        <div class="ai-cfg-row">
          <label class="ai-cfg-lbl">供應商</label>
          <select id="aiProvInline" onchange="onProvInlineChange()">
            <option value="openai">OpenAI</option>
            <option value="anthropic">Anthropic</option>
            <option value="deepseek">DeepSeek</option>
            <option value="minimax">MiniMax</option>
            <option value="siliconflow">硅基流動</option>
            <option value="openrouter">OpenRouter</option>
            <option value="ollama">Ollama（本地）</option>
            <option value="custom">自訂端點</option>
          </select>
        </div>
        <div class="ai-cfg-row" id="aiInlineUrlRow" style="display:none">
          <label class="ai-cfg-lbl">端點 URL</label>
          <input id="aiInlineUrl" type="text" placeholder="https://…">
        </div>
        <div class="ai-cfg-row">
          <label class="ai-cfg-lbl">模型</label>
          <select id="aiModelInline"></select>
        </div>

    function handleFile(file) {
      if (!file) return;
      const ext = file.name.split('.').pop().toLowerCase();
      if (ext === 'csv') {
        const r = new FileReader();
        r.onload = e => processCsv(e.target.result);
        r.readAsText(file, 'UTF-8');
      } else if (['xlsx', 'xls'].includes(ext)) {
        const r = new FileReader();
        r.onload = e => {
          const wb = XLSX.read(e.target.result, { type: 'array' });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
          parsedRows = rows;
          buildColMap(rows);
        };
        r.readAsArrayBuffer(file);
      } else {
        showVld('❌ 不支援此檔案格式，請使用 .csv / .xlsx / .xls', 'err');
      }
    }

    function processCsv(text) {
      const lines = text.replace(/^\uFEFF/, '').split(/\r?\n/).filter(l => l.trim());
      if (lines.length < 2) { showVld('❌ 檔案內容不足（至少需要標題列+1筆資料）', 'err'); return }
      const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
      const rows = lines.slice(1).map(l => {
        const vals = l.split(',').map(v => v.trim().replace(/^"|"$/g, ''));
        const obj = {}; headers.forEach((h, i) => obj[h] = vals[i] || '');
        return obj;
      }).filter(r => Object.values(r).some(v => v));
      parsedRows = rows;
      buildColMap(rows);
    }

    function buildColMap(rows) {
      if (!rows || !rows.length) return;
      const headers = Object.keys(rows[0]);
      const sec = document.getElementById('mapSection'); sec.style.display = 'block';
      const mapDiv = document.getElementById('colMapRows'); mapDiv.innerHTML = '';
      colMap = {};
      Object.keys(FIELD_ALIASES).forEach(field => {
        const aliases = FIELD_ALIASES[field];
        const matched = headers.find(h => aliases.map(a => a.toLowerCase()).includes(h.toLowerCase())) || '';
        if (matched) colMap[field] = matched;
        const opts = `<option value="">（不對應）</option>` + headers.map(h => `<option value="${h}" ${h === matched ? 'selected' : ''}>${h}</option>`).join('');
        const row = document.createElement('div'); row.className = 'col-map';
        row.innerHTML = `<div style="color:var(--tx);font-weight:600">${field} <small style="color:var(--tx3);font-weight:400">${REQUIRED.includes(field) ? '*' : ''}</small></div><div class="arrow">→</div><select id="map_${field}" onchange="updateMap('${field}',this.value)">${opts}</select>`;
        mapDiv.appendChild(row);
      });
      validateAndPreview(rows);
    }

    function updateMap(field, val) {
      if (val) colMap[field] = val; else delete colMap[field];
      validateAndPreview(parsedRows);
    }

    function validateAndPreview(rows) {
      const missing = REQUIRED.filter(f => !colMap[f]);
      const vldDiv = document.getElementById('vldMsg');
      if (missing.length) {
        vldDiv.innerHTML = `<div class="vld-msg err">⚠️ 缺少必要欄位對應：${missing.join(', ')}</div>`;
      } else {
        vldDiv.innerHTML = `<div class="vld-msg ok">✅ 欄位對應完整，共 ${rows.length} 筆資料可匯入（模式：${importMode === 'replace' ? '取代' : '追加'}）</div>`;
      }
      // preview
      const preview = rows.slice(0, 5);
      const mappedFields = Object.keys(colMap).filter(f => colMap[f]);
      const pb = document.getElementById('previewBox');
      pb.innerHTML = `<table><thead><tr>${mappedFields.map(f => `<th>${f}</th>`).join('')}</tr></thead><tbody>${preview.map(r => `<tr>${mappedFields.map(f => `<td>${r[colMap[f]] || ''}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
    }

    function confirmImport() {
      const missing = REQUIRED.filter(f => !colMap[f]);
      if (missing.length) { showVld('❌ 請先完成必要欄位對應：' + missing.join(', '), 'err'); return }
      const mapped = parsedRows.map(r => {
        const obj = { Cost_Type: '固定', Center: '管理後台', Revenue: 0, Region: '全區', Employee_Count: 0, Budget_Amount: 0, Project: '' };
        Object.keys(colMap).forEach(f => {
          const src = colMap[f]; if (!src) return;
          const v = r[src];
          if (['Actual_Amount', 'Budget_Amount', 'Employee_Count', 'Revenue'].includes(f)) obj[f] = +v || 0;
          else obj[f] = v || '';
        });
        return obj;
      }).filter(r => r.Date && r.Category && r.Department && r.Actual_Amount);
      if (!mapped.length) { showVld('❌ 沒有有效資料可匯入', 'err'); return }
      if (importMode === 'replace') gData = mapped;
      else gData = [...gData, ...mapped];

    }

    // ── Main AI trigger ─────────────────────────────────────────────────────────
    async function triggerAI(pageId) {
      if (!aiCfg.apiKey) {
        openAIPanel(pageId);
        showToast('⚠️ 請先在設定欄填入 API Key 並儲存', 'err');
        return;
      }
      openAIPanel(pageId);
      clearAIChat();
      setAIStatus('busy');

      const ctx = buildPageContext(pageId, getFilteredData());
      const filterDesc = describeFilters();
      const userMsg = `請分析以下【${pages.find(p => p.id === pageId)?.label || pageId}】頁面的費用數據，給出專業洞察與建議。

${filterDesc ? '**篩選條件**：' + filterDesc + '\n\n' : ''}${ctx}`;

      addAIMessage('user', userMsg, true);
      const loadId = addAILoading();

      const msgs = [
        { role: 'system', content: SYSTEM_PROMPT },
        { role: 'user', content: userMsg }
      ];

      aiHistory.push({ role: 'user', content: userMsg });
      setupQuickReplies(pageId);

      await callAI(msgs,
        (chunk) => { appendToLoading(loadId, chunk); },
        (full) => { finalizeLoading(loadId, full); aiHistory.push({ role: 'assistant', content: full }); updateRoundLabel(); setupQuickReplies(pageId); },
        (err) => { replaceLoading(loadId, '❌ 錯誤：' + escHtml(err)); setAIStatus('error'); }
      );
    }

    // ── Core Dispatcher ──────────────────────────────────────────────────────────
    let aiAbortCtrl = null;
    async function callAI(messages, onChunk, onDone, onError) {
      if (aiStreaming) { showToast('AI 正在回應中…', 'info'); return; }
      aiStreaming = true;
      aiAbortCtrl = new AbortController();
      const sendBtn = document.getElementById('aiSendBtn');
      const stopBtn = document.getElementById('aiStopBtn');
      if (sendBtn) sendBtn.disabled = true;
      if (stopBtn) stopBtn.style.display = 'inline-flex';
      setAIStatus('busy');

      try {
        const p = aiCfg.provider;
        const isAnthropic = (p === 'anthropic') || (p === 'custom' && aiCfg.apiFormat === 'anthropic');

        if (isAnthropic) {
          await _callAnthropic(messages, onChunk, onDone, onError);
        } else {
          await _callOpenAI(messages, onChunk, onDone, onError);
        }
      } catch (err) {
        if (err.name === 'AbortError') {
          onError('已停止');
          setAIStatus('idle');
        } else {
          console.error('AI Call Error:', err);
          onError(err.message);
          setAIStatus('error');
        }
      } finally {
        aiStreaming = false;
        aiAbortCtrl = null;
        if (sendBtn) sendBtn.disabled = false;
        if (stopBtn) stopBtn.style.display = 'none';
      }
    }

    function stopAI() {
      if (aiAbortCtrl) aiAbortCtrl.abort();
    }

    async function _callOpenAI(messages, onChunk, onDone, onError) {
      const p = aiCfg.provider;
      const useCustomUrl = p === 'custom' || p === 'openrouter' || p === 'ollama';
      const baseUrl = useCustomUrl ? (aiCfg.savedBaseUrls[p] || aiCfg.endpoint || AI_PROVIDERS[p]?.baseUrl || '') : AI_PROVIDERS[p].baseUrl;
      let fetchUrl = `${baseUrl}/chat/completions`;

      if (aiCfg.useCorsProxy) {
        fetchUrl = `http://localhost:8080/proxy?url=${encodeURIComponent(fetchUrl)}`;
      }

      const bodyObj = {
        model: aiCfg.model,
        messages,
        temperature: aiCfg.temperature,
        max_tokens: aiCfg.maxTokens || 4096,
        stream: aiCfg.useStream
      };
      if (p === 'minimax') bodyObj.reasoning_split = true;

      const resp = await fetch(fetchUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${aiCfg.apiKey}` },
        body: JSON.stringify(bodyObj),
        signal: aiAbortCtrl?.signal
      });

      if (!resp.ok) {
        const errTxt = await resp.text();
        throw new Error(`HTTP ${resp.status}: ${errTxt.slice(0, 200)}`);
      }

      if (aiCfg.useStream) {
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buf = '', full = '', thought = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          const lines = buf.split('\n');
          buf = lines.pop();

          for (const line of lines) {
            const clean = line.trim();
            if (!clean.startsWith('data: ')) continue;
            const data = clean.slice(6);
            if (data === '[DONE]') break;
            try {
              const json = JSON.parse(data);
              const delta = json.choices?.[0]?.delta;
              if (!delta) continue;
              const r_content = delta.reasoning_content || delta.reasoning || '';
              const content = delta.content || '';

              if (r_content) {
                thought += r_content;
                onChunk({ thought, content: full });
              }
              if (content) {
                full += content;
                onChunk({ thought, content: full });
              }
            } catch (e) { }
          }
        }
        onDone(thought ? `<thought>${thought}</thought>\n${full}` : full);
      } else {
        const json = await resp.json();
        const msg = json.choices?.[0]?.message;
        const th = msg?.reasoning_content || msg?.reasoning || '';
        const ct = msg?.content || '';
        onDone(th ? `<thought>${th}</thought>\n${ct}` : ct);
      }
    }

    async function _callAnthropic(messages, onChunk, onDone, onError) {
      const p = aiCfg.provider;
      const baseUrl = (p === 'anthropic') ? AI_PROVIDERS.anthropic.baseUrl : aiCfg.endpoint;
      let fetchUrl = `${baseUrl}/v1/messages`;

      if (aiCfg.useCorsProxy) {
        fetchUrl = `http://localhost:8080/proxy?url=${encodeURIComponent(fetchUrl)}`;
      }

      const sysMsg = messages.find(m => m.role === 'system')?.content || '';
      const userMsgs = messages.filter(m => m.role !== 'system');

      const resp = await fetch(fetchUrl, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': aiCfg.apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: aiCfg.model, system: sysMsg, messages: userMsgs,
          temperature: aiCfg.temperature, max_tokens: aiCfg.maxTokens || 4096, stream: aiCfg.useStream
        }),
        signal: aiAbortCtrl?.signal
      });

      if (!resp.ok) {
        const errTxt = await resp.text();
        throw new Error(`Anthropic Error ${resp.status}: ${errTxt.slice(0, 200)}`);
      }

      if (aiCfg.useStream) {
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let full = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          const chunk = decoder.decode(value, { stream: true });
          const lines = chunk.split('\n');
          for (const line of lines) {
            if (!line.startsWith('data:')) continue;
            const raw = line.slice(5).trim();
            if (!raw || raw === '[DONE]') continue;
            try {
              const ev = JSON.parse(raw);
              if (ev.type === 'content_block_delta' && ev.delta?.type === 'text_delta') {
                full += ev.delta.text;
                onChunk({ thought: '', content: full });
              }
            } catch (e) { }
          }
        }
        onDone(full);
      } else {
        const data = await resp.json();
        onDone(data.content?.[0]?.text || '');
      }
    }

    // ── Message UI ───────────────────────────────────────────────────────────────
    function addAIMessage(role, content, hideContent = false) {
      const body = document.getElementById('aiBody');
      const div = document.createElement('div');
      div.className = `ai-msg ${role}`;
      const roleLabel = role === 'user' ? '🧑 你' : '🤖 AI 分析師';
      const displayContent = hideContent ? '📋 分析本頁數據中…' : renderMarkdownAI(content);
      div.innerHTML = `<div class="ai-msg-role">${roleLabel}</div><div class="ai-msg-bubble ai-md">${displayContent}</div>`;
      body.appendChild(div);
      body.scrollTop = body.scrollHeight;
      return div;
    }

    function addAILoading() {
      const body = document.getElementById('aiBody');
      const id = 'aiLoad_' + Date.now();
      const div = document.createElement('div');
      div.className = 'ai-msg assistant';
      div.id = id;
      div.innerHTML = `<div class="ai-msg-role">🤖 AI 分析師</div><div class="ai-msg-bubble ai-md"><div class="ai-dots"><span></span><span></span><span></span></div></div>`;
      body.appendChild(div);
      body.scrollTop = body.scrollHeight;
      return id;
    }

    function appendToLoading(id, data) {
      const el = document.getElementById(id);
      if (!el) return;
      const bubble = el.querySelector('.ai-msg-bubble');
      if (!bubble) return;
      if (bubble.querySelector('.ai-dots')) bubble.innerHTML = '<span class="ai-stream-text"></span>';
      const span = bubble.querySelector('.ai-stream-text');
      if (span) {
        const content = typeof data === 'string' ? data : (data.thought ? `<thought>${data.thought}</thought>\n${data.content}` : data.content);
        span.innerHTML = renderMarkdownAI(content);
        document.getElementById('aiBody').scrollTop = document.getElementById('aiBody').scrollHeight;
      }
    }

    function finalizeLoading(id, fullText) {
      const el = document.getElementById(id);
      if (!el) return;
      const bubble = el.querySelector('.ai-msg-bubble');
      if (bubble) bubble.innerHTML = renderMarkdownAI(fullText);
      document.getElementById('aiBody').scrollTop = document.getElementById('aiBody').scrollHeight;
      saveAIChatCache();
      updateTokenHint();
      setAIStatus('ready');
    }

    function replaceLoading(id, errHtml) {
      const el = document.getElementById(id);
      if (!el) return;
      const bubble = el.querySelector('.ai-msg-bubble');
      if (bubble) bubble.innerHTML = errHtml;
    }

    // ── Follow-up chat ───────────────────────────────────────────────────────────
    async function sendFollowup() {
      const input = document.getElementById('aiInput');
      const text = input.value.trim();
      if (!text || aiStreaming) return;
      if (!aiCfg.apiKey) { showToast('⚠️ 請先在設定欄填入 API Key 並儲存', 'err'); return; }

      // Max 5 rounds = 10 messages
      if (aiHistory.length >= 10) {
        showToast('已達對話上限（5輪），請點「清除對話」重新開始', 'info');
        return;
      }

      input.value = '';
      input.style.height = 'auto';

      addAIMessage('user', text);
      aiHistory.push({ role: 'user', content: text });
      setAIStatus('busy');
      updateTokenHint();

      const loadId = addAILoading();

      const msgs = [
        { role: 'system', content: SYSTEM_PROMPT },
        ...aiHistory.slice(-10)
      ];

      await callAI(msgs,
        (data) => { appendToLoading(loadId, data); },
        (full) => { finalizeLoading(loadId, full); aiHistory.push({ role: 'assistant', content: full }); updateRoundLabel(); saveAIChatCache(); },
        (err) => { replaceLoading(loadId, '❌ 錯誤：' + escHtml(err)); setAIStatus('error'); }
      );

    // ── Markdown renderer ────────────────────────────────────────────────────────
    function renderMarkdownAI(text) {
      if (!text) return '';
      let html = text.replace(/<thought>([\s\S]*?)<\/thought>/g, (_, content) => {
        return `<div class="ai-thought"><div class="ai-thought-hd">💭 思考過程</div><div class="ai-thought-bd">${content.trim()}</div></div>`;
      });
      const thoughts = [];
      html = html.replace(/<div class="ai-thought">[\s\S]*?<\/div><\/div>/g, m => { thoughts.push(m); return `%%THOUGHT_${thoughts.length - 1}%%`; });

      let t = html
        .replace(/```[\w]*\n?([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
        .replace(/`([^`\n]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\*([^*\n]+)\*/g, '<em>$1</em>')
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        .replace(/^---+$/gm, '<hr>')
        .replace(/^[*-] (.+)$/gm, '<li>$1</li>')
        .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
        .replace(/【([^】]+)】/g, '<span class="ai-tag">【$1】</span>')
        .replace(/(⚠️[^\n<]*)/g, '<span class="ai-warn">$1</span>');

      t = t.replace(/((?:<li>[^<]*<\/li>\s*)+)/g, '<ul>$1</ul>');
      const tableRegex = /(?:^\|.+\|\s*\n)+/gm;
      t = t.replace(tableRegex, block => {
        const rows = block.trim().split('\n');
        let h = '<table>', first = true;
        rows.forEach(r => {
          if (/^\|[\s:-]+\|/.test(r)) return;
          const c = r.split('|').filter((_, i, a) => i > 0 && i < a.length - 1);
          h += first ? '<tr>' + c.map(x => `<th>${x.trim()}</th>`).join('') + '</tr>' : '<tr>' + c.map(x => `<td>${x.trim()}</td>`).join('') + '</tr>';
          first = false;
        });
        return h + '</table>';
      });

      t = t.replace(/\n\n+/g, '</p><p>').replace(/\n/g, '<br>');
      t = '<p>' + t + '</p>';
      thoughts.forEach((tr, i) => { t = t.replace(`%%THOUGHT_${i}%%`, tr); });
      return t;
    }

    // ── Page context builder ─────────────────────────────────────────────────────
    function buildPageContext(pageId, data) {
      const N = data.length;
      if (!N) return '（目前篩選後無資料）';

      const total = data.reduce((s, r) => s + (+r.Actual_Amount || 0), 0);
      const budget = data.reduce((s, r) => s + (+r.Budget_Amount || 0), 0);
      const rev = data.reduce((s, r) => s + (+r.Revenue || 0), 0);
      const fmtN = n => new Intl.NumberFormat('zh-TW').format(Math.round(n));

      const byDept = aggBy(data, 'Department');
      const byCat = aggBy(data, 'Category');
      const byMo = months(data);
      const topDept = Object.entries(byDept).sort((a, b) => b[1] - a[1]).slice(0, 5).map(([k, v]) => `${k}:${fmtN(v)}`).join('、');
      const topCat = Object.entries(byCat).sort((a, b) => b[1] - a[1]).slice(0, 5).map(([k, v]) => `${k}:${fmtN(v)}`).join('、');
      const moList = Object.entries(byMo).sort((a, b) => a[0] > b[0] ? 1 : -1).map(([m, v]) => `${m}:${fmtN(v)}`).join('、');
      const overBudget = data.filter(r => (+r.Actual_Amount) > (+r.Budget_Amount));
      const varAmt = data.filter(r => r.Cost_Type === '變動').reduce((s, r) => s + (+r.Actual_Amount || 0), 0);
      const fixAmt = total - varAmt;
      const byReg = aggBy(data, 'Region');
      const byCtr = aggBy(data, 'Center');
      const byCtrList = Object.entries(byCtr).map(([k, v]) => `${k}:${fmtN(v)}`).join('、');

      const base = `【基礎統計】筆數:${N}｜總費用:${fmtN(total)}｜預算:${fmtN(budget)}｜差異:${fmtN(total - budget)}(${budget ? ((total - budget) / budget * 100).toFixed(1) : '—'}%)
【費用性態】固定:${fmtN(fixAmt)}(${total ? (fixAmt / total * 100).toFixed(1) : '0'}%)｜變動:${fmtN(varAmt)}(${total ? (varAmt / total * 100).toFixed(1) : '0'}%)
【相關營收】${fmtN(rev)}｜ROI:${rev && total ? ((rev - total) / total * 100).toFixed(1) : '—'}%
【超支項目】${overBudget.length}筆，最高超支：${overBudget.sort((a, b) => (b.Actual_Amount - b.Budget_Amount) - (a.Actual_Amount - a.Budget_Amount)).slice(0, 3).map(r => `${r.Category}/${r.Department}超支${fmtN((+r.Actual_Amount) - (+r.Budget_Amount))}`).join('；') || '無'}
【月度趨勢】${moList}
【部門Top5】${topDept}
【科目Top5】${topCat}
【地區分布】${Object.entries(byReg).map(([k, v]) => `${k}:${fmtN(v)}`).join('、')}
【責任中心】${byCtrList}`;

      const pageExtra = {
        p0: '（總覽頁：請綜合評估整體費用健康度）',
        p1: `（月趨勢頁：月度數據如上，請分析趨勢與季節性）`,
        p2: `（部門分析頁：各部門費用如上，請評估部門費用合理性與效率）`,
        p3: `（科目分布頁：各科目費用如上，請分析科目結構與優化空間）`,
        p4: `（預算比較頁：超支${overBudget.length}筆，請深入分析預算執行狀況）`,
        p5: `（地區分析頁：地區費用分布如上，請分析地區差異原因）`,
        p6: (() => { const byProj = aggBy(data, 'Project'); const topProj = Object.entries(byProj).sort((a, b) => b[1] - a[1]).slice(0, 5).map(([k, v]) => `${k}:${fmtN(v)}`).join('、'); return `（專案費用頁：專案Top5：${topProj}，請評估專案費用效益）` })(),
        p7: (() => { const depts = Object.keys(byDept); const byEmp = aggBy(data, 'Department', 'Employee_Count'); const perCapita = depts.map(d => `${d}:${byEmp[d] ? fmtN(Math.round(byDept[d] / byEmp[d])) : 0}/人`).join('、'); return `（人均費用頁：各部門人均：${perCapita}，請分析人均費用合理性）` })(),
        p8: `（資料明細頁：共${N}筆明細，請協助識別異常或需稽核的記錄）`,
        p9: `（資料匯入頁：目前資料集共${gData.length}筆，涵蓋期間為${gData.map(r => r.Date).filter(Boolean).sort()[0]}至${gData.map(r => r.Date).filter(Boolean).sort().pop()}）`,
        p10: `（費用性態頁：固定${fmtN(fixAmt)}、變動${fmtN(varAmt)}，請分析性態比例的財務影響）`,
        p11: `（責任中心頁：${byCtrList}，請評估各責任中心的費用管控績效）`,
        p12: `（營收關聯頁：相關營收${fmtN(rev)}，費用${fmtN(total)}，請分析費用投入產出效益）`
      };

      return base + '\n' + (pageExtra[pageId] || '');
    }

    function describeFilters() {
      const parts = [];
      if (fs.monthStart || fs.monthEnd) parts.push(`月份：${fs.monthStart || '—'} 至 ${fs.monthEnd || '—'}`);
      if (fs.departments.length) parts.push(`部門：${fs.departments.join('、')}`);
      if (fs.categories.length) parts.push(`科目：${fs.categories.join('、')}`);
      if (fs.regions.length) parts.push(`地區：${fs.regions.join('、')}`);
      if (fs.centers.length) parts.push(`責任中心：${fs.centers.join('、')}`);
      if (fs.costType !== 'all') parts.push(`費用性態：${fs.costType === 'fix' ? '固定' : '變動'}`);
      return parts.join('；');
    }

    // ── Helpers ──────────────────────────────────────────────────────────────────
    let toastTimer;
    function showToast(msg, type = 'info') {
      const el = document.getElementById('aiToast');
      if (!el) return;
      el.textContent = msg;
      el.className = `ai-toast ${type} show`;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
    }

    // ── New V3-Style Functions ────────────────────────────────────────────────────

    function toggleAIPanel() {
      const panel = document.getElementById('aiPanel');
      if (panel.classList.contains('open')) {
        closeAIPanel();
      } else {
        openAIPanel(aiCurrentPage);
      }
    }

    function setAIStatus(state) {
      const badge = document.getElementById('aiStatusBadge');
      if (!badge) return;
      const map = { idle: '● 閒置', ready: '● 就緒', busy: '⟳ 分析中', error: '● 錯誤' };
      badge.className = `ai-status-badge ${state}`;
      badge.textContent = map[state] || '● 就緒';
    }

    function updateAICtxBar() {
      const pg = pages.find(p => p.id === aiCurrentPage);
      const ctxPage = document.getElementById('aiCtxPage');
      if (ctxPage && pg) ctxPage.textContent = pg.label;
    }

    // ── Inline config panel ───────────────────────────────────────────────────────
    function toggleAICfgSection() {
      const body = document.getElementById('aiCfgBody');
      const arrow = document.getElementById('aiCfgArrow');
      if (!body) return;
      const collapsed = body.classList.toggle('collapsed');
      if (arrow) arrow.classList.toggle('collapsed', collapsed);
    }

    function onProvInlineChange() {
      const sel = document.getElementById('aiProvInline');
      if (!sel) return;
      const id = sel.value;
      const urlRow = document.getElementById('aiInlineUrlRow');
      const fmtRow = document.getElementById('aiInlineFmtRow');
      if (urlRow) urlRow.style.display = (id === 'custom' || id === 'openrouter' || id === 'ollama') ? 'flex' : 'none';
      if (fmtRow) fmtRow.style.display = (id === 'custom') ? 'flex' : 'none';
      updateInlineModelOptions(id);
      const keyEl = document.getElementById('aiKeyInline');
      if (keyEl) keyEl.value = aiCfg.savedKeys[id] || '';
      const urlEl = document.getElementById('aiInlineUrl');
      if (urlEl) urlEl.value = aiCfg.savedBaseUrls[id] || AI_PROVIDERS[id]?.baseUrl || '';
    }

    function updateInlineModelOptions(providerId) {
      const sel = document.getElementById('aiModelInline');
      if (!sel) return;
      const prov = AI_PROVIDERS[providerId];
      if (!prov || !prov.models || !prov.models.length) {
        sel.outerHTML = `<input type="text" id="aiModelInline" placeholder="請輸入模型名稱" value="">`;
        return;
      }
      sel.innerHTML = prov.models.map(m =>
        `<option value="${m}"${m === aiCfg.model ? ' selected' : ''}>${m}</option>`
      ).join('');
    }

    function toggleInlineKeyVis() {
      const inp = document.getElementById('aiKeyInline');
      if (inp) inp.type = inp.type === 'password' ? 'text' : 'password';
    }

    function toggleInlineAdv() {
      const body = document.getElementById('aiInlineAdv');
      const arrow = document.getElementById('aiAdvArrow');
      if (!body) return;
      const open = body.style.display === 'block';
      body.style.display = open ? 'none' : 'block';
      if (arrow) arrow.textContent = open ? '▸' : '▾';
    }

    function saveAIInlineCfg() {
      const provSel = document.getElementById('aiProvInline');
      const keyEl = document.getElementById('aiKeyInline');
      const modelEl = document.getElementById('aiModelInline');
      const urlEl = document.getElementById('aiInlineUrl');
      const tempEl = document.getElementById('aiTempInline');
      const maxTokEl = document.getElementById('aiMaxTokInline');
      const streamEl = document.getElementById('aiStreamInline');
      const proxyEl = document.getElementById('aiProxyInline');
      const fmtEl = document.getElementById('aiFmtInline');

      if (provSel) aiCfg.provider = provSel.value;
      if (keyEl && keyEl.value.trim()) {
        aiCfg.apiKey = keyEl.value.trim();
        aiCfg.savedKeys[aiCfg.provider] = aiCfg.apiKey;
      }
      if (modelEl) aiCfg.model = modelEl.value.trim();
      if (urlEl && urlEl.value.trim()) {
        aiCfg.endpoint = urlEl.value.trim();
        aiCfg.savedBaseUrls[aiCfg.provider] = aiCfg.endpoint;
      }
      if (tempEl) aiCfg.temperature = parseFloat(tempEl.value) || 0.3;
      if (maxTokEl) aiCfg.maxTokens = parseInt(maxTokEl.value) || 4096;
      if (streamEl) aiCfg.useStream = streamEl.checked;
      if (proxyEl) aiCfg.useCorsProxy = proxyEl.value === '1';
      if (fmtEl) aiCfg.apiFormat = fmtEl.value;

      saveAICfgToStorage();
      updateAIProvLabel();
      showToast('✅ AI 設定已儲存', 'ok');
    }

    function clearAISavedCfg() {
      if (!confirm('確定清除所有已儲存的 API Key 與設定？')) return;
      aiCfg.savedKeys = {};
      aiCfg.savedBaseUrls = {};
      aiCfg.apiKey = '';
      saveAICfgToStorage();
      localStorage.removeItem(AI_CFG_KEY + '_chat');
      showToast('🗑 設定已清除', 'info');
    }

    function loadAIInlineCfg() {
      const provSel = document.getElementById('aiProvInline');
      if (provSel) {
        provSel.value = aiCfg.provider || 'openai';
        onProvInlineChange();
      }
      const keyEl = document.getElementById('aiKeyInline');
      if (keyEl) keyEl.value = aiCfg.savedKeys[aiCfg.provider] || aiCfg.apiKey || '';
      const modelEl = document.getElementById('aiModelInline');
      if (modelEl) modelEl.value = aiCfg.model || '';
      const tempEl = document.getElementById('aiTempInline');
      if (tempEl) tempEl.value = aiCfg.temperature ?? 0.3;
      const maxTokEl = document.getElementById('aiMaxTokInline');
      if (maxTokEl) maxTokEl.value = aiCfg.maxTokens || 4096;
      const streamEl = document.getElementById('aiStreamInline');
      if (streamEl) streamEl.checked = aiCfg.useStream !== false;
      const proxyEl = document.getElementById('aiProxyInline');
      if (proxyEl) proxyEl.value = aiCfg.useCorsProxy ? '1' : '0';
    }

    // ── Quick-send helpers ───────────────────────────────────────────────────────
    function sendQuickWithCtx(text) {
      const input = document.getElementById('aiInput');
      if (input) { input.value = text; sendFollowup(); }
    }

    function triggerPageAIFromPanel() {
      triggerAI(aiCurrentPage);
    }

    // ── Chat cache ───────────────────────────────────────────────────────────────
    const AI_CHAT_CACHE_KEY = AI_CFG_KEY + '_chat';

    function saveAIChatCache() {
      try {
        localStorage.setItem(AI_CHAT_CACHE_KEY, JSON.stringify({ page: aiCurrentPage, history: aiHistory, html: document.getElementById('aiBody')?.innerHTML || '' }));
      } catch (e) { }
    }

    function restoreAIChat() {
      try {
        const s = localStorage.getItem(AI_CHAT_CACHE_KEY);
        if (!s) return;
        const cache = JSON.parse(s);
        if (cache.history && cache.history.length) {
          aiHistory = cache.history;
          const body = document.getElementById('aiBody');
          if (body && cache.html) body.innerHTML = cache.html;
          updateRoundLabel();
          updateTokenHint();
        }
      } catch (e) { }
    }

    function exportAIChat() {
      if (!aiHistory.length) { showToast('沒有對話可匯出', 'info'); return; }
      const lines = aiHistory.map(m => `【${m.role === 'user' ? '使用者' : 'AI'}】\n${m.content}`).join('\n\n---\n\n');
      const blob = new Blob([lines], { type: 'text/plain;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'AI_Chat_Export_' + new Date().toISOString().slice(0, 10) + '.txt';
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function updateTokenHint() {
      const el = document.getElementById('aiTokenHint');
      if (!el) return;
      const total = aiHistory.reduce((s, m) => s + (m.content?.length || 0), 0);
      if (!total) { el.textContent = '預估 Token：—'; return; }
      const est = Math.round(total / 2);
      el.textContent = `預估 Token：≈ ${est.toLocaleString()}`;
    }

    // ── Init AI ──────────────────────────────────────────────────────────────────
    loadAICfg();

    // ─── INIT ───────────────────────────────────────────────────────────────────
    applyTheme();
    buildLayout();
    applyTheme(); // re-call after button created
    buildFilterBar();
    renderPage('p0');
  </script>
</body>

</html>
